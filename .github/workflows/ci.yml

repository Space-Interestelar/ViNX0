name: Primer Flujo ViNX0
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  prueba-python:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar versión
        run: python --version
